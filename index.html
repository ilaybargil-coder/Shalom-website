<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>שלום יאיר עמר | משרד עורכי דין</title>
  <meta name="description" content="שלום יאיר עמר — משרד עורכי דין. האתר בבנייה, נשוב בקרוב."/>
  <!-- No noindex — this page should be publicly indexed -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@300;400;600;700&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0F1B2D;
      --gold:  #C9A046;
    }
    body {
      font-family: 'Manrope', 'Noto Serif Hebrew', sans-serif;
      background-color: #F8F6F1;
      color: var(--navy);
    }
    .font-serif-he {
      font-family: 'Noto Serif Hebrew', Georgia, serif;
    }
    /* Watermark */
    .watermark {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
      user-select: none;
    }
    .watermark span {
      font-family: Georgia, serif;
      font-size: clamp(18rem, 40vw, 36rem);
      font-weight: 700;
      color: var(--navy);
      opacity: 0.022;
      line-height: 1;
      letter-spacing: -0.05em;
    }
    /* Gold line */
    .gold-line {
      height: 1px;
      background: linear-gradient(to left, transparent, var(--gold), transparent);
      width: 100%;
      max-width: 320px;
      opacity: 0.7;
    }
    /* Pulse badge */
    @keyframes gentle-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    .badge-pulse {
      animation: gentle-pulse 2.8s ease-in-out infinite;
    }
    /* Contact links */
    a.contact-link {
      color: var(--navy);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s, color 0.2s;
      direction: ltr;
      display: inline-block;
    }
    a.contact-link:hover {
      opacity: 1;
      color: var(--gold);
    }
    /* Fade-in on load */
    .fade-in {
      animation: fadeIn 1.1s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation-delay: 0.15s; }
    .delay-2 { animation-delay: 0.3s; }
    .delay-3 { animation-delay: 0.45s; }
    .delay-4 { animation-delay: 0.6s; }
    .delay-5 { animation-delay: 0.75s; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

  <!-- Watermark -->
  <div class="watermark" aria-hidden="true">
    <span>SA</span>
  </div>

  <!-- Main content -->
  <main class="relative z-10 flex flex-col items-center text-center px-6 py-16 gap-8 w-full max-w-lg mx-auto">

    <!-- Logo -->
    <div class="fade-in delay-1">
      <img src="logo.svg" alt="שלום יאיר עמר משרד עורכי דין" class="h-16 mx-auto"/>
    </div>

    <!-- Top gold line -->
    <div class="gold-line fade-in delay-2 mx-auto"></div>

    <!-- Name heading -->
    <div class="fade-in delay-2">
      <h1 class="font-serif-he text-4xl sm:text-5xl font-bold tracking-tight leading-snug" style="color: var(--navy);">
        שלום יאיר עמר
      </h1>
      <p class="mt-2 text-xs font-light tracking-[0.25em] uppercase" style="color: var(--gold);">
        SHALOM YAIR AMAR &nbsp;|&nbsp; LAW OFFICE
      </p>
    </div>

    <!-- Bottom gold line -->
    <div class="gold-line fade-in delay-3 mx-auto"></div>

    <!-- Under construction badge -->
    <div class="fade-in delay-3">
      <span class="badge-pulse inline-flex items-center gap-2 px-5 py-2 rounded-full text-sm font-medium border"
            style="border-color: var(--gold); color: var(--gold); background: rgba(201,160,70,0.07);">
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none" aria-hidden="true">
          <circle cx="4" cy="4" r="4" fill="#C9A046"/>
        </svg>
        האתר בבנייה — נשוב בקרוב
      </span>
    </div>

    <!-- Contact details -->
    <div class="fade-in delay-4 flex flex-col items-center gap-3 mt-2">
      <p class="text-xs tracking-widest uppercase font-light opacity-40" style="letter-spacing:0.18em;">
        ליצירת קשר
      </p>
      <div class="flex flex-col sm:flex-row items-center gap-4 text-sm">
        <!-- Phone -->
        <a href="tel:0542464315" class="contact-link flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79
                     19.79 0 0 1 1.65 3.4 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81
                     2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45
                     12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          054-246-4315
        </a>
        <!-- Divider (desktop) -->
        <span class="hidden sm:block opacity-20" aria-hidden="true">|</span>
        <!-- Email -->
        <a href="mailto:syamar113@gmail.com" class="contact-link flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          syamar113@gmail.com
        </a>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="relative z-10 pb-8 text-center fade-in delay-5">
    <p class="text-xs opacity-30 tracking-wide" style="font-family:'Manrope',sans-serif;">
      &copy; <span id="yr"></span> שלום יאיר עמר, משרד עורכי דין. כל הזכויות שמורות.
    </p>
  </footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>

</body>
</html>
