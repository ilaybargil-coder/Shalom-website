<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 148" width="520" height="148" role="img" aria-label="שלום יאיר עמר משרד עורכי דין">
  <defs>
    <!-- Rich gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7A5810"/>
      <stop offset="25%"  stop-color="#C9A040"/>
      <stop offset="55%"  stop-color="#F0DC98"/>
      <stop offset="80%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#8A6415"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0DC98"/>
      <stop offset="50%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#7A5810"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════
       MONOGRAM BLOCK  (0 – 192)
  ═══════════════════════════════════ -->

  <!-- S  — large serif, left anchor -->
  <text x="0" y="120"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-size="112" font-weight="700"
        fill="url(#gold)">S</text>

  <!-- Swoosh arc: from lower-S, curves up over the scales to the A peak -->
  <path d="M 26,132  C 60,80  90,10  192,38"
        fill="none" stroke="url(#gold)" stroke-width="5"
        stroke-linecap="round" opacity="0.90"/>

  <!-- ── SCALES OF JUSTICE ── -->
  <!-- Top pivot triangle -->
  <polygon points="98,16  90,36  106,36" fill="url(#gold)"/>

  <!-- Horizontal beam -->
  <rect x="36" y="34" width="124" height="3.5" rx="1.8" fill="url(#gold)"/>

  <!-- Central pole -->
  <rect x="96" y="37" width="4.5" height="72" fill="url(#gold)"/>

  <!-- Left suspension wire -->
  <line x1="50"  y1="37" x2="50"  y2="72" stroke="url(#gold)" stroke-width="1.8"/>
  <!-- Left pan arc -->
  <path d="M 30,72  Q 50,64  70,72"
        fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>

  <!-- Right suspension wire -->
  <line x1="148" y1="37" x2="148" y2="72" stroke="url(#gold)" stroke-width="1.8"/>
  <!-- Right pan arc -->
  <path d="M 128,72 Q 148,64 168,72"
        fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>

  <!-- Two pillars -->
  <rect x="80"  y="108" width="7" height="24" fill="url(#gold)"/>
  <rect x="110" y="108" width="7" height="24" fill="url(#gold)"/>
  <!-- Pillar capitals -->
  <rect x="75"  y="104" width="17" height="5" rx="1" fill="url(#gold)"/>
  <rect x="105" y="104" width="17" height="5" rx="1" fill="url(#gold)"/>
  <!-- Base platform -->
  <rect x="68" y="130" width="62" height="6" rx="1.5" fill="url(#gold)"/>

  <!-- A — positioned to the right, overlapping scales base -->
  <text x="116" y="122"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-size="95" font-weight="700"
        fill="url(#gold)">A</text>

  <!-- ═══════════════════════════════════
       SEPARATOR
  ═══════════════════════════════════ -->
  <line x1="205" y1="8" x2="205" y2="140"
        stroke="url(#goldV)" stroke-width="1.6" opacity="0.75"/>

  <!-- ═══════════════════════════════════
       TEXT BLOCK  (220 – 516)
  ═══════════════════════════════════ -->

  <!-- Hebrew: שלום יאיר עמר — right-aligned to edge -->
  <text x="516" y="54"
        text-anchor="end"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-size="40" font-weight="700"
        fill="url(#gold)"
        direction="rtl" unicode-bidi="embed">שלום יאיר עמר</text>

  <!-- SHALOM YAIR AMAR -->
  <text x="222" y="98"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="600"
        fill="url(#gold)"
        letter-spacing="2.5">SHALOM YAIR AMAR</text>

  <!-- LAW OFFICE -->
  <text x="222" y="126"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-size="15.5" font-weight="400"
        fill="url(#gold)"
        letter-spacing="7">LAW  OFFICE</text>

</svg>
