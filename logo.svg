<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 108" width="280" height="108" role="img" aria-label="שלום יאיר עמר משרד עורכי דין">

  <!-- Top thin rule -->
  <line x1="44" y1="7" x2="236" y2="7" stroke="#0F1B2D" stroke-width="0.6" opacity="0.22"/>

  <!-- SA Monogram — large elegant serif -->
  <text
    x="140" y="68"
    text-anchor="middle"
    font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
    font-size="72"
    font-weight="700"
    fill="#0F1B2D"
    letter-spacing="-3">SA</text>

  <!-- Bottom thin rule with gold dots -->
  <line x1="44" y1="78" x2="236" y2="78" stroke="#0F1B2D" stroke-width="0.6" opacity="0.22"/>
  <circle cx="40"  cy="78" r="2.2" fill="#C9A046"/>
  <circle cx="240" cy="78" r="2.2" fill="#C9A046"/>

  <!-- Hebrew name -->
  <text
    x="140" y="93"
    text-anchor="middle"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="13.5"
    font-weight="600"
    fill="#0F1B2D"
    direction="rtl">שלום יאיר עמר</text>

  <!-- Sub-label -->
  <text
    x="140" y="106"
    text-anchor="middle"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="7.5"
    font-weight="400"
    fill="#9aabbb"
    letter-spacing="4">LAW  OFFICE</text>

</svg>
